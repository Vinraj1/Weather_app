{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="{% static 'style.css' %}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<body
{% if exception_occured %}
style="background-image:url('https://images.pexels.com/photos/3008509/pexels-photo-3008509.jpeg?auto=compress&cs=tinysrgb&w=1600');"
{% else %}
style="background-image:url('{{ image_url }}');"
{% endif %}
>

<div class="overlay"></div>

<div class="container">

<h1 class="title">🌦 Weather Dashboard</h1>

<form method="POST" id="weatherForm">
{% csrf_token %}

<div class="search-box">

<input
type="text"
name="city"
placeholder="Search city..."
required
/>

<button type="submit" class="search-btn">
Search
</button>

</div>

</form>

{% if city %}

<div class="weather-card">

<div class="weather-main">

<div class="temp-section">

<h2 class="temp">{{ temp }}°C</h2>

<h2 class="city">{{ city }}</h2>

<p class="day">{{ day }}</p>

</div>

<div class="icon-section">

<img src="http://openweathermap.org/img/w/{{ icon }}.png">

<p class="desc">{{ description }}</p>

</div>

</div>

<div class="weather-details">

<div class="detail-card">
<p>Pressure</p>
<h3>{{ pressure }}</h3>
</div>

<div class="detail-card">
<p>Humidity</p>
<h3>{{ humidity }}</h3>
</div>

<div class="detail-card">
<p>Wind</p>
<h3>{{ wind }}</h3>
</div>

</div>

</div>

{% endif %}

</div>


{% if exception_occured %}
<script>
window.onload = function(){
alert("Entered city is incorrect");
}
</script>
{% endif %}

</body>
</html>
